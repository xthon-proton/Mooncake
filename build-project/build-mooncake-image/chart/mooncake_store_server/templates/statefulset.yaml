apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mooncake.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "mooncake.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "mooncake.headlessName" . }}    # 必须对应无头 Service 名
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mooncake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mooncake.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mooncake.serviceAccountName" . }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ------------------------------------------------------------
      # 反亲和性：单节点关闭、多节点强烈建议打开（按 values 开关）
      # ------------------------------------------------------------
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "mooncake.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}

      # ------------------------------------------------------------
      # initContainers
      #   1) 等待 etcd 就绪（按 values.waitEtcd.enabled 开关）；
      #   2) 当 master.rpcAddressMode=pod_fqdn 时，等待自身 Pod
      #      在 headless Service DNS 中出现，避免首次 bind 解析失败。
      #      —— 这是 #9 澄清里"提供 initContainer 等待本 Pod DNS 就绪示例"
      #         所要求的注释/示例。pod_ip 模式下不需要等待 DNS。
      # ------------------------------------------------------------
      {{- if or .Values.waitEtcd.enabled (eq .Values.master.rpcAddressMode "pod_fqdn") }}
      initContainers:
        {{- if .Values.waitEtcd.enabled }}
        - name: wait-etcd
          image: {{ .Values.waitEtcd.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.waitEtcd.host }} {{ .Values.waitEtcd.port }}; do
                echo "等待 etcd 就绪..."
                sleep 2
              done
              echo "etcd 可达"
        {{- end }}
        {{- if eq .Values.master.rpcAddressMode "pod_fqdn" }}
        # ----------------------------------------------------------
        # 示例：等待本 Pod 在 headless Service 的 DNS 注册完成。
        # 触发场景：master.rpcAddressMode=pod_fqdn 时，主进程会用 FQDN
        # 做 bind/advertise；headless service 注册 A 记录有几百 ms 延迟，
        # 不等就 bind 可能直接 ENXIO / DNS 解析失败。
        # 实现思路：循环 nslookup 自身 FQDN，能解析到 IP 即继续。
        # ----------------------------------------------------------
        - name: wait-self-dns
          image: {{ .Values.waitEtcd.image | quote }}   # 复用 busybox
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          command:
            - sh
            - -c
            - |
              FQDN="${POD_NAME}.{{ include "mooncake.headlessName" . }}.${POD_NAMESPACE}.svc.cluster.local"
              echo "等待自身 DNS 就绪：${FQDN}"
              for i in $(seq 1 60); do
                if nslookup "${FQDN}" >/dev/null 2>&1; then
                  echo "DNS OK: ${FQDN}"; exit 0
                fi
                sleep 2
              done
              echo "DNS 等待超时：${FQDN}"; exit 1
        {{- end }}
      {{- end }}

      containers:
        - name: mooncake-master
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          ports:
            - name: rpc
              containerPort: {{ .Values.master.rpcPort }}
            - name: metrics
              containerPort: {{ .Values.master.metricsPort }}
            - name: http-meta
              containerPort: {{ .Values.master.httpMetadataServerPort }}

          # ----- downward API：注入 Pod IP / Pod 名 / namespace -----
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }

          # ----- 启动参数 -----
          # 按 #8 澄清：默认使用 POD_IP；FQDN 模式作为可选（配 wait-self-dns initContainer）
          args:
            {{- if eq .Values.master.rpcAddressMode "pod_fqdn" }}
            - --rpc_address=$(POD_NAME).{{ include "mooncake.headlessName" . }}.$(POD_NAMESPACE).svc.cluster.local
            {{- else }}
            - --rpc_address=$(POD_IP)
            {{- end }}
            - --rpc_port={{ .Values.master.rpcPort }}
            - --metrics_port={{ .Values.master.metricsPort }}
            - --enable_ha={{ .Values.master.enableHA }}
            - --etcd_endpoints={{ .Values.master.etcdEndpoints }}
            - --enable_http_metadata_server={{ .Values.master.enableHttpMetadataServer }}
            - --http_metadata_server_port={{ .Values.master.httpMetadataServerPort }}
            - --cluster_id={{ .Values.master.clusterId }}
            - --alsologtostderr={{ .Values.master.alsologtostderr }}
            - --log_dir={{ .Values.master.logDir }}

          # ----------------------------------------------------------
          # 健康检查（按 #9 澄清：主备统一，都用 tcpSocket:8888）
          # 收益：
          #   1) 备机不监听 50051/9001，但始终监听 http_metadata_server_port
          #      → 用 8888 做探针，主备复用同一份模板；
          #   2) liveness 比 readiness 宽松（更长 period / 更高 failureThreshold），
          #      避免主切备瞬时抖动直接被 kill；
          #   3) 不使用 httpGet，避免 glog keep-alive 的探针噪音日志。
          # ----------------------------------------------------------
          readinessProbe:
            tcpSocket:
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
