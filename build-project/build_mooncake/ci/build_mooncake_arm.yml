# =============================================================================
# build_mooncake_arm.yml
# 阶段二工程任务：
#   1) 从制品仓拉取阶段一产出的 tar.gz；
#   2) 构建 docker 镜像并打成 7z；
#   3) helm package 生成 chart 并打成 7z；
#   4) 推送 image 7z + chart 7z 到产品仓。
# =============================================================================

name: build_mooncake_arm
arch: aarch64
os: euleros-2sp12

env:
  # ----- 版本 / 命名 ----------------------------------------------------------
  CHART_VERSION: "v0.1"
  IMAGE_NAME: "mooncake-store-server"
  IMAGE_TAG: "v0.1"
  MOONCAKE_VERSION: "v0.3.10"
  # ----- 阶段一制品（mock 占位符） -------------------------------------------
  ARTIFACT_REPO_BASE: "https://artifact.example.com/mooncake"
  # 完整 URL = ${ARTIFACT_REPO_BASE}/${MOONCAKE_VERSION}/aarch64/${ARTIFACT_FILE}
  # ARTIFACT_FILE 由 1_pull_artifact.sh 解析最新制品名（或工程任务注入）
  # ----- 基础镜像（mock 占位符） ---------------------------------------------
  BASE_IMAGE: "registry.example.com/base/euler2sp12arm:2.0.0.SPC13"
  # ----- 调测开关：debug=true 时镜像额外 EXPOSE 50052/9002/8889 -------------
  BUILD_PROFILE: "release"   # release | debug
  # ----- 产品仓（mock 占位符） -----------------------------------------------
  PRODUCT_REPO_BASE: "https://product.example.com/mooncake"

manifest: build-project/build_mooncake/manifest/build_mooncake.xml

stages:

  PRE_BUILD:
    description: "拉取阶段一制品并解压到 docker build context"
    timeout_minutes: 15
    steps:
      - name: pull-artifact
        run: bash build-project/build_mooncake/scripts/1_pull_artifact.sh

  BUILD:
    description: "构建 docker 镜像 + 制 chart"
    timeout_minutes: 45
    steps:
      - name: build-image
        run: bash build-project/build_mooncake/scripts/2_build_image.sh
      - name: build-chart
        run: bash build-project/build_mooncake/scripts/3_build_chart.sh

  POST_BUILD:
    description: "推送到产品仓"
    timeout_minutes: 15
    steps:
      - name: push-product
        run: bash build-project/build_mooncake/scripts/4_push_product.sh

artifacts:
  - path: "${WORKSPACE}/dist/V0.1_Images_EulerOS-Aarch64_Docker-MooncakeStoreServer-Any.7z"
    type: archive
    upload_to: "${PRODUCT_REPO_BASE}/${CHART_VERSION}/images/"
  - path: "${WORKSPACE}/dist/V0.1_Chart_Any_Docker-MooncakeStoreServer-Any.7z"
    type: archive
    upload_to: "${PRODUCT_REPO_BASE}/${CHART_VERSION}/charts/"
