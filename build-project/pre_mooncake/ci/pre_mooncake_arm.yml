# =============================================================================
# pre_mooncake_arm.yml
# 阶段一工程任务：编译 Mooncake v0.3.10 的 mooncake_master 并打包为 tar.gz
# 制品上传到制品仓（mock 占位符见 env），供阶段二消费。
# 三段：PRE_BUILD（环境）→ BUILD（依赖+主程+收集打包）→ POST_BUILD（推送）
# =============================================================================

name: pre_mooncake_arm
arch: aarch64
os: euleros-2sp12

# ----- 工程任务变量（mock 占位符，上线前替换）-------------------------------
env:
  MOONCAKE_VERSION: "v0.3.10"
  ARTIFACT_REPO_BASE: "https://artifact.example.com/mooncake"
  # 输出路径：${ARTIFACT_REPO_BASE}/${MOONCAKE_VERSION}/aarch64/<artifact>.tar.gz
  GO_INSTALL_VERSION: "1.26.1"
  GO_MIN_VERSION: "1.23.7"
  GCC_TOOLCHAIN_PREFIX: "/usr/local/gcc-12"

# ----- 源码拉取（由工程任务依据 manifest 自动执行，不在此处 git clone） -----
manifest: build-project/pre_mooncake/manifest/pre_mooncake.xml

# ----- 三段构建 -------------------------------------------------------------
stages:

  PRE_BUILD:
    description: "环境校验 / 工具链准备"
    timeout_minutes: 20
    steps:
      - name: preflight
        run: bash build-project/pre_mooncake/scripts/1_preflight.sh

  BUILD:
    description: "依赖编译 → mooncake_master 编译 → 制品收集打包"
    timeout_minutes: 120
    steps:
      - name: build-third-party-deps
        run: bash build-project/pre_mooncake/scripts/2_build_deps.sh
      - name: build-mooncake-master
        run: bash build-project/pre_mooncake/scripts/3_build_mooncake.sh
      - name: collect-and-pack
        run: bash build-project/pre_mooncake/scripts/4_collect_artifact.sh

  POST_BUILD:
    description: "推送制品到制品仓"
    timeout_minutes: 15
    steps:
      - name: push-artifact
        run: bash build-project/pre_mooncake/scripts/5_push_artifact.sh

# ----- 产物声明（供工程任务索引、归档）-------------------------------------
artifacts:
  - path: "${WORKSPACE}/dist/mooncake-master_${MOONCAKE_VERSION}_euleros-aarch64_*.tar.gz"
    type: tarball
    upload_to: "${ARTIFACT_REPO_BASE}/${MOONCAKE_VERSION}/aarch64/"
